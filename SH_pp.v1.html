<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting to new privacy policy</title>
  <link rel="stylesheet" href="style-SH.css?v=1.0.0.2">
  <link rel="preload" href="src/empty-bg.png?v=1.0.0.1" as="image">
  <link rel="preload" href="src/spinner.png?v=1.0.0.0" as="image">
</head>
<body>
  <button id="menuToggleBtn" class="menu-toggle hidden">Меню</button>
  <div id="preloader">
    <img src="src/spinner.png?v=1.0.0.0" alt="Loading..." class="spinner">
    <div class="loading-text">Загрузка...</div>
  </div>
  <div id="content">
    <div class="center-all">
      <div class="button-group">
          <a href="SH_pp_ru.html?v=1.0.0.1" class="glow-button">
            <span class="button-text">Перенаправление на русскую политику конфиденциальности</span>
          </a>
          <a href="SH_pp_en.html?v=1.0.0.1" class="glow-button">
            <span class="button-text">Redirecting to english privacy policy</span>
          </a>
      </div>
    </div>
  </div>
    <script src="start.js?v=1.0.0.0"></script>
    <script>
      (function() {
          if (!sessionStorage.getItem("updated")) { // Проверяем, было ли обновление
              let url = window.location.href.split('?')[0]; // Чистим URL от старых параметров
              let newUrl = url + '?t=' + new Date().getTime(); // Добавляем метку времени
      
              sessionStorage.setItem("updated", "true"); // Запоминаем, что обновление произошло
              window.location.replace(newUrl); // Перезагружаем страницу с новым URL
          }
      })();
    </script>
    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const header = document.querySelector(".header");
        const menuBtn = document.getElementById("menuToggleBtn");

        // стартовое состояние: меню скрыто, кнопка видима
        header.classList.add("hidden");
        menuBtn.classList.remove("hidden");

        function hideMenu() {
            header.classList.add("hidden");
            menuBtn.classList.remove("hidden");
        }

        function showMenu() {
            header.classList.remove("hidden");
            menuBtn.classList.add("hidden");
        }

        header.addEventListener("click", (e) => {
            const isClickable = e.target.closest("a") || e.target.closest(".logo");
            if (!isClickable) hideMenu();
        });

        menuBtn.addEventListener("click", showMenu);
    });
    </script>
</body>
</html>
